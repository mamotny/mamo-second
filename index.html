<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTFOLIO TERMINAL</title>
<style>
  :root{
    --bg:#080a0d; --panel:#0d1014; --row:#0f1318; --rowhi:#141a21;
    --line:#1c232c; --line2:#252e39;
    --txt:#d4dae0; --dim:#6b7682; --label:#8a96a3;
    --up:#00e08a; --down:#ff4d5e; --amber:#ffb01f; --cyan:#36c5f0;
    --mono:"SF Mono","JetBrains Mono","Menlo","Consolas",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:13px;
    -webkit-font-smoothing:antialiased;padding-bottom:40px}
  a{color:inherit;text-decoration:none}

  /* ticker tape */
  .tape{background:#000;border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;
    height:30px;display:flex;align-items:center}
  .tape-track{display:inline-block;padding-left:100%;animation:scroll 28s linear infinite}
  .tape-track span{margin:0 22px;font-size:12px;letter-spacing:.5px}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}

  /* header */
  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;
    padding:14px 20px;border-bottom:1px solid var(--line2);background:var(--panel)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:3px;color:#fff}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--up);letter-spacing:1px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);box-shadow:0 0 8px var(--up);
    animation:blink 1.6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .hmeta{font-size:11px;color:var(--dim);text-align:right;line-height:1.7}
  .hmeta b{color:var(--label);font-weight:600}

  main{padding:18px 20px;max-width:1240px;margin:0 auto}
  .note{font-size:11px;color:var(--dim);margin-bottom:16px;border-left:2px solid var(--line2);padding-left:10px}

  /* group */
  .grp{margin-bottom:22px}
  .grp-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .grp-h .t{font-size:11px;letter-spacing:2px;color:var(--cyan);font-weight:700}
  .grp-h .l{flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}

  /* table */
  table{width:100%;border-collapse:collapse}
  thead th{font-size:10px;letter-spacing:1px;color:var(--label);text-align:right;
    padding:6px 12px;border-bottom:1px solid var(--line2);font-weight:600}
  thead th.l{text-align:left}
  tbody tr.main{cursor:pointer;border-bottom:1px solid var(--line);background:var(--row);
    transition:background .12s}
  tbody tr.main:hover{background:var(--rowhi)}
  tbody td{padding:9px 12px;text-align:right;white-space:nowrap}
  td.l{text-align:left}
  .tkr{font-weight:700;color:#fff;letter-spacing:.5px}
  .nm{color:var(--dim);font-size:11px;margin-left:8px}
  .last{font-weight:600}
  .chg{font-weight:700}
  .up{color:var(--up)} .down{color:var(--down)} .amber{color:var(--amber)}
  .arrow{font-size:10px}
  .pill{display:inline-block;min-width:20px;font-size:11px;color:var(--cyan);
    border:1px solid var(--line2);border-radius:4px;padding:1px 7px}
  .caret{display:inline-block;width:12px;color:var(--dim);transition:transform .15s}
  tr.main.open .caret{transform:rotate(90deg);color:var(--cyan)}

  /* detail */
  tr.detail td{padding:0;border-bottom:1px solid var(--line)}
  .det{max-height:0;overflow:hidden;transition:max-height .25s ease;background:#0a0d11}
  tr.detail.open .det{max-height:600px}
  .det-in{padding:14px 18px 16px 40px;display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
  .det-in h5{font-size:10px;letter-spacing:1.5px;color:var(--label);margin-bottom:8px}
  .news{list-style:none;display:flex;flex-direction:column;gap:7px}
  .news li{font-size:12px;line-height:1.5}
  .news .d{color:var(--amber);font-weight:700;margin-right:8px}
  .news a{border-bottom:1px dotted var(--line2)}
  .news a:hover{color:var(--cyan);border-color:var(--cyan)}
  .outlook{font-size:12px;line-height:1.6;color:#c2cad2;background:var(--row);
    border-left:2px solid var(--cyan);padding:9px 12px;border-radius:0 6px 6px 0}
  .det-meta{font-size:11px;color:var(--dim);margin-top:10px}

  footer{max-width:1240px;margin:24px auto 0;padding:14px 20px;border-top:1px solid var(--line2);
    font-size:11px;color:var(--dim)}
  .flag{color:var(--amber);margin-bottom:4px}

  @media(max-width:720px){
    .det-in{grid-template-columns:1fr}
    .nm{display:none}
    thead th.hide,td.hide{display:none}
  }
</style>
</head>
<body>
<div class="tape"><div class="tape-track" id="tape"></div></div>

<header>
  <div class="brand">
    <h1>◆ PORTFOLIO TERMINAL</h1>
    <span class="live"><span class="dot"></span>LIVE</span>
  </div>
  <div class="hmeta" id="hmeta"></div>
</header>

<main>
  <div class="note" id="note"></div>
  <div id="groups"></div>
</main>
<footer id="footer"></footer>

<script>
// ====== DATA (毎朝この部分を差し替える) ======
const DATA = {
  asOf: "2026-05-28",
  generatedAt: "2026-05-29",
  groups: [
    { title:"EQUITIES", items:[
      {
        tkr:"TSLA", name:"Tesla", market:"NASDAQ",
        last:"$441.01", chg:"+9.9% / YTD -5.3%", dir:"up",
        meta:"時価総額 ~$1.66T ・ 52週 $273–$499",
        news:[
          {d:"4/22", t:"Q1 2026 決算 EPS $0.41(予想 $0.30、+37%)。受注残は過去最高", u:"https://www.nasdaq.com/market-activity/stocks/tsla"},
          {d:"5/14", t:"Robotaxi 大規模展開は2027年初の v15 FSD 後の見通し", u:"https://www.fool.com/investing/2026/05/14/heres-when-teslas-robotaxi-rollout-will-really-ram/"},
          {d:"5/28", t:"$600 到達には「長い道のり」との慎重論", u:"https://www.foreignpolicyjournal.com/2026/05/28/tesla-tsla-stock-price-faces-long-odds-on-road-to-600-in-2026/"}
        ],
        outlook:"アナリスト二分:Wedbush 強気・目標 $600 / Morgan Stanley 中立・目標 $415。"
      },
      {
        tkr:"7157", name:"ライフネット生命保険", market:"東証グロース",
        last:"¥1,711", chg:"-6.0%(5/13決算日)", dir:"down",
        meta:"時価総額 ~¥1,375億 ・ 52週 ¥1,643–¥2,365",
        news:[
          {d:"5/13", t:"FY2025 純利益 +34.2% ¥80.4億 — 4期連続最高益", u:"https://kabutan.jp/news/?b=k202605130364"},
          {d:"5/13", t:"FY2026 ガイダンス +2.0% と保守的で出尽くし売り、安値更新", u:"https://kabutan.jp/news/?b=k202605130364"}
        ],
        outlook:"好決算でも株価下落。ガイダンス鈍化が嫌気。5/29ザラ場は要確認。"
      }
    ]},
    { title:"CRYPTO", items:[
      {
        tkr:"BTC", name:"Bitcoin", market:"24H",
        last:"~$73,460", chg:"-2.6% (24h)", dir:"down",
        meta:"約 ¥1,230万/BTC ・ $73K–$77K で保ち合い",
        news:[
          {d:"5/28", t:"米イラン緊張(ホルムズ海峡)で risk-off、下落", u:"https://fortune.com/article/price-of-bitcoin-05-28-2026/"},
          {d:"5/28", t:"スポットBTC ETF が6営業日連続で流出 計~$1.26B", u:"https://www.coindesk.com/"},
          {d:"5/7", t:"Tom Lee:5月を $76K 超で終えれば新たな強気相場確認", u:"https://www.coindesk.com/markets/2026/05/07/bitcoin-ending-may-above-usd76-000-would-confirm-new-bull-market-tom-lee-says"}
        ],
        outlook:"短期は地政学+ETF流出が逆風、構造的には規制整備(CLARITY法)が追い風。"
      }
    ]},
    { title:"PRIVATE / PRE-IPO", items:[
      {
        tkr:"SPCX", name:"SpaceX", market:"未上場→IPO 6/12",
        last:"$1.75T–$2T", chg:"IPO想定評価額", dir:"amber",
        meta:"直近私募 ~$800B(2025-12)・ S-1提出済",
        news:[
          {d:"5/20", t:"S-1提出。2025年売上 $18.7B(Starlink 61%)。Musk 議決権85%", u:"https://www.npr.org/2026/05/20/nx-s1-5812731/elon-musk-spacex-ai-ipo"},
          {d:"5/26", t:"FTSE Russell が大型IPO早期組入れ容認、SPCX 指数入りへ", u:"https://www.bloomberg.com/news/articles/2026-05-26/spacex-ipo-gets-another-greenlight-toward-faster-index-inclusion"}
        ],
        outlook:"史上最大IPOへ。評価根拠はほぼ Starlink 収益性。近く換金性が生じる点が最重要。"
      },
      {
        tkr:"ANTH", name:"Anthropic", market:"未上場",
        last:"$965B", chg:"前回比 約2.5倍(5/28)", dir:"up",
        meta:"Series H 調達 $65B ・ 前回 $380B(2026-02)",
        news:[
          {d:"5/28", t:"$965B で資金調達、OpenAI($852B)を抜き世界最大のAIスタートアップに", u:"https://www.bloomberg.com/news/articles/2026-05-28/anthropic-raises-at-965-billion-valuation-eclipsing-openai"},
          {d:"5/28", t:"売上ラン率 $47B(2025年通年 $10B)。IPO前最後の私募の可能性", u:"https://techcrunch.com/2026/05/28/anthropic-raises-65-billion-nears-1t-valuation-ahead-of-ipo/"}
        ],
        outlook:"保有資産評価が一段と上昇。次の節目は IPO 動向。"
      }
    ]}
  ],
  flags:[
    "ライフネット 5/29 ザラ場価格は未取得(前日終値ベース)。",
    "SpaceX 最終評価額は $1.75T(S-1)〜$2T超(Bloomberg)で報道に幅。ロードショーで確定。",
    "保有数量未登録のため損益・資産配分は未算出。"
  ]
};

// ====== RENDER ======
const sym = {up:"▲", down:"▼", amber:"●"};
const allItems = DATA.groups.flatMap(g=>g.items);

// ticker tape
document.getElementById("tape").innerHTML = allItems.concat(allItems).map(it=>
  `<span><b>${it.tkr}</b> <span class="${it.dir}">${it.last} ${sym[it.dir]} ${it.chg.split(" ")[0]}</span></span>`
).join("");

// header meta
document.getElementById("hmeta").innerHTML =
  `<b>AS OF</b> ${DATA.asOf} &nbsp;|&nbsp; <b>GEN</b> ${DATA.generatedAt}<br>${allItems.length} POSITIONS ・ 前日終値ベース`;

document.getElementById("note").textContent =
  "上場株は前日終値ベース(15〜20分遅延ソース)/ 未上場株は直近評価額 / 保有数量未登録のため損益・配分は非表示。行をクリックで詳細展開。";

// groups + tables
const groups = document.getElementById("groups");
let idx = 0;
DATA.groups.forEach(g=>{
  const rows = g.items.map(it=>{
    const i = idx++;
    const news = it.news.map(n=>`<li><span class="d">${n.d}</span><a href="${n.u}" target="_blank" rel="noopener">${n.t}</a></li>`).join("");
    return `
      <tr class="main" data-i="${i}">
        <td class="l"><span class="caret">▸</span> <span class="tkr">${it.tkr}</span><span class="nm">${it.name}</span></td>
        <td class="l hide"><span class="nm" style="margin:0">${it.market}</span></td>
        <td class="last">${it.last}</td>
        <td class="chg ${it.dir}">${it.chg} <span class="arrow">${sym[it.dir]}</span></td>
        <td><span class="pill">${it.news.length}</span></td>
      </tr>
      <tr class="detail" data-i="${i}"><td colspan="5"><div class="det"><div class="det-in">
        <div><h5>NEWS</h5><ul class="news">${news}</ul><div class="det-meta">${it.meta}</div></div>
        <div><h5>RESEARCH</h5><div class="outlook">${it.outlook}</div></div>
      </div></div></td></tr>`;
  }).join("");
  groups.insertAdjacentHTML("beforeend", `
    <div class="grp">
      <div class="grp-h"><span class="t">${g.title}</span><span class="l"></span></div>
      <table>
        <thead><tr>
          <th class="l">TICKER</th><th class="l hide">MARKET</th>
          <th>LAST</th><th>CHG</th><th>NEWS</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`);
});

// expand/collapse
document.querySelectorAll("tr.main").forEach(tr=>{
  tr.addEventListener("click",()=>{
    const i = tr.dataset.i;
    const det = document.querySelector(`tr.detail[data-i="${i}"]`);
    tr.classList.toggle("open");
    det.classList.toggle("open");
  });
});

// footer
document.getElementById("footer").innerHTML =
  DATA.flags.map(f=>`<div class="flag">⚠ ${f}</div>`).join("") +
  `<div style="margin-top:10px;color:var(--dim)">出典は各ニュース見出しのリンク先。投資判断は自己責任で。 ◆ generated by Claude</div>`;
</script>
</body>
</html>
